<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chess Arena - GM Le Quang Liem</title>
    <link rel="icon" href="data:,">
    <style>
        :root {
            --cell-size: 60px;
            --light-bg: #f0d9b5;
            --dark-bg: #b58863;
        }
        body {
            margin: 0; padding: 20px; background: #1a1a1a; color: #e0e0e0;
            font-family: 'Courier New', Courier, monospace;
            display: flex; flex-direction: column; align-items: center;
            min-height: 100vh; position: relative; box-sizing: border-box;
            padding-bottom: 60px;
        }
        
        .main-headline {
            font-size: 26px; font-weight: 900; color: #ffae00;
            text-transform: uppercase; letter-spacing: 2px;
            margin-bottom: 25px; text-align: center;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.6);
        }

        .controls { margin-bottom: 25px; display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
        button, select {
            background: #333; color: #fff; border: 1px solid #555;
            padding: 8px 15px; cursor: pointer; font-family: monospace; font-size: 14px;
        }
        button:hover:not(:disabled), select:not(:disabled) { background: #444; }
        button:disabled, select:disabled { opacity: 0.5; cursor: not-allowed; }
        
        .main-container { display: flex; gap: 25px; flex-wrap: wrap; justify-content: center; }
        .board-wrapper { display: flex; flex-direction: column; align-items: center; }
        
        .board-header { font-size: 16px; font-weight: bold; color: #aaa; margin-bottom: 12px; text-transform: uppercase; letter-spacing: 1px; text-align: center; min-height: 20px;}
        .board-footer { font-size: 13px; color: #666; margin-top: 12px; font-style: italic; }

        .board {
            display: grid; grid-template-columns: repeat(8, var(--cell-size));
            grid-template-rows: repeat(8, var(--cell-size));
            border: 3px solid #444; user-select: none; position: relative; background: #252525;
        }
        
        .board.engine-busy { pointer-events: none; }
        .cell {
            width: var(--cell-size); height: var(--cell-size);
            display: flex; align-items: center; justify-content: center; font-size: 40px; cursor: pointer; position: relative;
        }
        .light { background: var(--light-bg); }
        .dark { background: var(--dark-bg); }
        
        .cell.selected { background: #7b975d !important; }
        .cell.last-move { background: #baca44 !important; }
        .cell.in-check { background: #cc3333 !important; animation: pulse 1s infinite; }
        .cell.hint-move { border: 3px solid #00ffff !important; box-sizing: border-box; animation: pulse-hint 1s infinite; }

        .cell.legal-target::after {
            content: ''; width: 16px; height: 16px; background: rgba(0, 0, 0, 0.2); border-radius: 50%; position: absolute; z-index: 2; pointer-events: none;
        }
        
        .piece { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; pointer-events: none; z-index: 1; }
        .piece.w { color: #ffffff; filter: drop-shadow(0px 0px 2px #000); }
        .piece.b { color: #000000; filter: drop-shadow(0px 0px 1px #fff); }
        
        .sidebar { width: 300px; height: calc(var(--cell-size) * 8 + 6px); display: flex; flex-direction: column; gap: 15px; box-sizing: border-box; }
        .avatar-box { width: 100%; height: 180px; border: 2px solid #444; background: #252525; overflow: hidden; display: flex; align-items: center; justify-content: center; }
        .avatar-box img { width: 100%; height: 100%; object-fit: cover; }

        .history-box { flex-grow: 1; background: #252525; border: 2px solid #444; display: flex; flex-direction: column; overflow: hidden; }
        .sidebar-title { background: #333; padding: 10px; font-weight: bold; text-align: center; border-bottom: 1px solid #444; font-size: 14px;}
        .history-log { padding: 10px; overflow-y: auto; flex-grow: 1; font-size: 13px; line-height: 1.6; color: #ccc; }
        
        .promotion-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.75); display: flex; justify-content: center; align-items: center; gap: 15px; z-index: 10; display: none;
        }
        .promo-choice {
            font-size: 45px; background: #444; width: 70px; height: 70px; display: flex; align-items: center; justify-content: center; cursor: pointer; border-radius: 4px; border: 2px solid #fff;
        }

        .fatal-error-screen {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: #111; color: #ff3333; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 9999; font-family: 'Courier New', monospace; font-size: 16px; text-align: center; padding: 40px; box-sizing: border-box; display: none; line-height: 1.6;
        }

        .author-credits {
            position: absolute; bottom: 15px; width: 100%; text-align: center;
            font-size: 12px; color: #555; letter-spacing: 1px; font-weight: bold;
            text-transform: uppercase; pointer-events: none;
        }
        
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.6; } 100% { opacity: 1; } }
        @keyframes pulse-hint { 0% { border-color: #00ffff; } 50% { border-color: rgba(0, 255, 255, 0.2); } 100% { border-color: #00ffff; } }
    </style>
</head>
<body>

    <div id="fatalScreen" class="fatal-error-screen">
        <h2 style="letter-spacing: 2px;">⚠️ SECURITY EXCEPTION</h2>
        <div id="fatalMessage" style="font-weight: bold; color: #fff;"></div>
        <div id="fatalDiagnostic" style="margin-top: 15px; color: #ffae00;"></div>
    </div>

    <div class="main-headline">bạn đang đấu với siêu đại kiện tướng LÊ QUANG LIÊM</div>

    <div class="controls">
        <select id="playerColor">
            <option value="w">Quân Trắng (Đi trước)</option>
            <option value="b">Quân Đen (Đi sau)</option>
        </select>
        <button id="btnNewGame">Ván Mới</button>
        <button id="btnUndo" style="background: #444;">Quay Lại ↩</button> 
        <button id="btnHint" style="background: #2a4d69;">Gợi ý nước đi 💡</button> 
    </div>

    <div class="main-container">
        <div class="board-wrapper">
            <div class="board-header" id="boardHeader">ĐANG KẾT NỐI...</div>
            <div class="board" id="chessBoard">
                <div class="promotion-overlay" id="promotionOverlay"></div>
            </div>
            <div class="board-footer">Hệ thống mô phỏng Engine chuyên nghiệp</div>
        </div>
        
        <div class="sidebar">
            <div class="avatar-box">
                <img src="https://images.chesscomfiles.com/uploads/v1/master_player/7df3da53-623c-11eb-898e-7bb2a00df8be.d7790bdf.250x250.o.e63c0cd72b99.jpeg" alt="GM Le Quang Liem">
            </div>
            <div class="history-box">
                <div class="sidebar-title">BIÊN BẢN TRẬN ĐẤU</div>
                <div class="history-log" id="historyLog"></div>
            </div>
        </div>
    </div>

    <div class="author-credits">trò chơi có tác giả là NGÔ PHÚ THÀNH</div>

    <script src="./libs/chess.min.js"></script>

    <script>
        "use strict";

        const UNICODE_PIECES = {
            'p': '♟', 'r': '♜', 'n': '♞', 'b': '♝', 'q': '♛', 'k': '♚',
            'P': '♙', 'R': '♖', 'N': '♘', 'B': '♗', 'Q': '♕', 'K': '♔'
        };

        const EngineState = {
            TERMINATED: "TERMINATED", INITIALIZING: "INITIALIZING",
            IDLE: "IDLE", SEARCHING: "SEARCHING", HINTING: "HINTING"
        };

        let currentEngineState = EngineState.TERMINATED;
        let game = null; let humanColor = 'w';
        let engineWorker = null; let activeSessionId = null;
        let currentMultiPVMoves = {}; let currentEngineEvaluation = 0.00;
        let domCache = {}; let cachedSelectedSquare = null;
        let cachedLastMoveSquares = []; let cachedLegalHighlightSquares = [];
        let cachedHintSquares = []; let cachedCheckSquare = null;
        let pendingPromotionMove = null;

        function transitionTo(nextState) { currentEngineState = nextState; }

        const ChessAdapter = {
            isCheck() { return game?.in_check?.() || game?.isCheck?.() || false; },
            isCheckmate() { return game?.in_checkmate?.() || game?.isCheckmate?.() || false; },
            isGameOver() { return game?.game_over?.() || game?.isGameOver?.() || false; },
            isDraw() { return game?.in_draw?.() || game?.isDraw?.() || false; }
        };

        function createStaticBoard() {
            domCache = {};
            const boardContainer = document.getElementById('chessBoard');
            const overlay = document.getElementById('promotionOverlay');
            boardContainer.innerHTML = '';
            boardContainer.appendChild(overlay);

            const isRotated = (humanColor === 'b');
            for (let r = 0; r < 8; r++) {
                for (let c = 0; c < 8; c++) {
                    const row = isRotated ? r : 7 - r;
                    const col = isRotated ? 7 - c : c;
                    const square = String.fromCharCode(97 + col) + (row + 1);

                    const cell = document.createElement('div');
                    cell.className = `cell ${(row + col) % 2 === 0 ? 'dark' : 'light'}`;
                    cell.dataset.square = square;
                    boardContainer.appendChild(cell);
                    domCache[square] = cell; 
                }
            }
        }

        function syncBoardStateFull() {
            if (Object.keys(domCache).length !== 64 || !game) return;
            for (let rank = 1; rank <= 8; rank++) {
                for (let file = 0; file < 8; file++) {
                    const square = String.fromCharCode(97 + file) + rank;
                    const pieceObj = game.get(square);
                    const cell = domCache[square];
                    if (!cell) continue;

                    if (pieceObj) {
                        const symbol = UNICODE_PIECES[pieceObj.color === 'w' ? pieceObj.type.toUpperCase() : pieceObj.type];
                        if (!cell.firstChild || cell.firstChild.textContent !== symbol || cell.dataset.color !== pieceObj.color) {
                            cell.dataset.color = pieceObj.color;
                            const pieceDom = document.createElement('div');
                            pieceDom.className = `piece ${pieceObj.color}`;
                            pieceDom.textContent = symbol;
                            cell.replaceChildren(pieceDom);
                        }
                    } else if (cell.firstChild) { cell.replaceChildren(); delete cell.dataset.color; }
                }
            }
            if (cachedCheckSquare) { cachedCheckSquare.classList.remove('in-check'); cachedCheckSquare = null; }
            if (ChessAdapter.isCheck()) {
                const currentTurn = game.turn();
                for (let rank = 1; rank <= 8; rank++) {
                    for (let file = 0; file < 8; file++) {
                        const sqName = String.fromCharCode(97 + file) + rank;
                        const p = game.get(sqName);
                        if (p && p.type === 'k' && p.color === currentTurn) {
                            cachedCheckSquare = domCache[sqName];
                            if (cachedCheckSquare) cachedCheckSquare.classList.add('in-check');
                        }
                    }
                }
            }
        }

        function initEngineWorker() {
            if (engineWorker) { try { engineWorker.terminate(); } catch(e) {} engineWorker = null; }
            transitionTo(EngineState.INITIALIZING);
            try {
                engineWorker = new Worker("./libs/stockfish.js");
                activeSessionId = crypto.randomUUID();
                engineWorker.sessionId = activeSessionId;
            } catch(e) { return; }

            const localSessionId = activeSessionId;
            engineWorker.onmessage = function(e) {
                if (localSessionId !== activeSessionId || currentEngineState === EngineState.TERMINATED) return;
                const msg = e.data.trim();
                if (msg.startsWith("info ") && msg.includes(" multipv ")) parseMultiPVLine(msg);
                if (msg.includes("uciok")) { transitionTo(EngineState.IDLE); engineWorker.postMessage("setoption name MultiPV value 4"); }
                if (msg.startsWith("bestmove")) {
                    const defaultBestMove = msg.split(" ")[1];
                    if (currentEngineState === EngineState.SEARCHING) {
                        setControlState(false); transitionTo(EngineState.IDLE);
                        let chosenMove = executeAdaptiveBrainLogic(defaultBestMove);
                        if (chosenMove) executeMoveDirect({from: chosenMove.substring(0, 2), to: chosenMove.substring(2, 4), promotion: chosenMove.substring(4, 5) || undefined});
                    } else if (currentEngineState === EngineState.HINTING) {
                        setControlState(false); transitionTo(EngineState.IDLE);
                        if (defaultBestMove && defaultBestMove !== "(none)") showHintOnBoard(defaultBestMove.substring(0, 2), defaultBestMove.substring(2, 4));
                    }
                }
            };
            engineWorker.postMessage("uci");
        }

        function parseMultiPVLine(line) {
            const pvMatch = line.match(/multiv (\d+)/); const moveMatch = line.match(/ pv ([a-h][1-8][a-h][1-8][qrbn]?)/);
            if (!pvMatch || !moveMatch) return;
            const pvId = parseInt(pvMatch[1]); const moveStr = moveMatch[1];
            let score = 0;
            if (line.includes("score cp ")) score = parseInt(line.match(/score cp (-?\d+)/)[1]) / 100;
            const aiColor = humanColor === 'w' ? 'b' : 'w';
            if (aiColor === 'b') score = -score;
            currentMultiPVMoves[pvId] = { move: moveStr, score: score };
            if (pvId === 1) currentEngineEvaluation = score;
        }

        function executeAdaptiveBrainLogic(defaultBestMove) {
            const branches = [currentMultiPVMoves[1], currentMultiPVMoves[2], currentMultiPVMoves[3]].filter(Boolean);
            if (branches.length === 0) return defaultBestMove;
            const fen = game.fen().split(' ')[0];
            if ((fen.match(/[a-zA-Z]/g) || []).length <= 12 || currentEngineEvaluation <= 0.4) return branches[0].move;
            return branches.find(b => b.score > -1.2)?.move || branches[0].move;
        }

        function initGame() {
            currentMultiPVMoves = {}; currentEngineEvaluation = 0.00; cachedSelectedSquare = null;
            pendingPromotionMove = null; document.getElementById('promotionOverlay').style.display = 'none';
            document.getElementById('historyLog').replaceChildren();
            if (game) game.reset();
            setControlState(false); clearAllHighlightsDirect(); createStaticBoard(); syncBoardStateFull();
            if (!engineWorker) initEngineWorker(); else engineWorker.postMessage('ucinewgame');
            updateStatus();
        }

        function setControlState(isBusy) {
            const boardEl = document.getElementById('chessBoard');
            if (isBusy) boardEl.classList.add('engine-busy'); else boardEl.classList.remove('engine-busy');
        }

        function handleSquareClick(square) {
            if (!game) return;
            const piece = game.get(square); clearHintHighlightsDirect();
            if (cachedSelectedSquare) { domCache[cachedSelectedSquare]?.classList.remove('selected'); clearLegalHighlightsDirect(); }

            const activeTurnColor = game.turn();
            const allowedToMove = engineWorker ? (activeTurnColor === humanColor) : true;

            if (cachedSelectedSquare === null) {
                if (piece && piece.color === activeTurnColor && allowedToMove) {
                    cachedSelectedSquare = square;
                    domCache[square].classList.add('selected');
                    showLegalMovesDirect(square);
                }
            } else {
                if (cachedSelectedSquare === square) cachedSelectedSquare = null;
                else {
                    const moves = game.moves({ verbose: true });
                    const isPromotion = moves.some(m => m.from === cachedSelectedSquare && m.to === square && m.flags.includes('p'));
                    if (isPromotion) {
                        pendingPromotionMove = { from: cachedSelectedSquare, to: square };
                        showPromotionUI();
                        cachedSelectedSquare = null; return;
                    }
                    const move = game.move({ from: cachedSelectedSquare, to: square });
                    if (move) {
                        cachedSelectedSquare = null; updateHistoryPanel(move.san); syncBoardStateFull(); updateStatus();
                        if (engineWorker) triggerEngineCalculation();
                    } else if (piece && piece.color === activeTurnColor) {
                        cachedSelectedSquare = square; domCache[square].classList.add('selected'); showLegalMovesDirect(square);
                    } else cachedSelectedSquare = null;
                }
            }
        }

        function showLegalMovesDirect(square) {
            game.moves({ square: square, verbose: true }).forEach(m => {
                const cell = domCache[m.to];
                if (cell) { cell.classList.add('legal-target'); cachedLegalHighlightSquares.push(cell); }
            });
        }

        function showPromotionUI() {
            const overlay = document.getElementById('promotionOverlay');
            overlay.replaceChildren();
            setControlState(true);
            const pieces = game.turn() === 'w' ? ['Q', 'R', 'B', 'N'] : ['q', 'r', 'b', 'n'];
            pieces.forEach(p => {
                const btn = document.createElement('div');
                btn.className = 'promo-choice';
                btn.textContent = UNICODE_PIECES[p];
                btn.addEventListener("click", () => {
                    overlay.style.display = 'none';
                    const move = game.move({ from: pendingPromotionMove.from, to: pendingPromotionMove.to, promotion: p.toLowerCase() });
                    if (move) {
                        updateHistoryPanel(move.san);
                        syncBoardStateFull(); updateStatus();
                        pendingPromotionMove = null; setControlState(false);
                        if (engineWorker) triggerEngineCalculation();
                    }
                });
                overlay.appendChild(btn);
            });
            overlay.style.display = 'flex';
        }

        function triggerEngineCalculation() {
            if (!engineWorker || !game || ChessAdapter.isGameOver()) { setControlState(false); return; }
            transitionTo(EngineState.SEARCHING); setControlState(true);
            engineWorker.postMessage(`position fen ${game.fen()}`);
            engineWorker.postMessage("go movetime 1000"); 
        }

        function triggerEngineHint() {
            if (!engineWorker || currentEngineState !== EngineState.IDLE || !game || ChessAdapter.isGameOver()) return;
            clearHintHighlightsDirect(); transitionTo(EngineState.HINTING); setControlState(true);
            engineWorker.postMessage(`position fen ${game.fen()}`);
            engineWorker.postMessage("go movetime 1000");
        }

        function showHintOnBoard(from, to) {
            domCache[from]?.classList.add('hint-move'); domCache[to]?.classList.add('hint-move');
            cachedHintSquares.push(domCache[from], domCache[to]);
        }

        function executeMoveDirect(moveObj) {
            const move = game.move(moveObj);
            if (move) { updateHistoryPanel(move.san); syncBoardStateFull(); updateStatus(); }
        }

        function clearAllHighlightsDirect() {
            document.querySelectorAll('.cell').forEach(c => c.classList.remove('last-move', 'legal-target', 'hint-move'));
            cachedLastMoveSquares = []; cachedLegalHighlightSquares = []; cachedHintSquares = [];
        }

        function clearHintHighlightsDirect() { cachedHintSquares.forEach(c => c?.classList.remove('hint-move')); cachedHintSquares = []; }

        function updateHistoryPanel(sanMove) {
            const log = document.getElementById('historyLog');
            if (game.turn() === 'b') {
                const row = document.createElement('div');
                row.id = `move-row-${Math.floor(game.history().length / 2) + 1}`;
                row.innerHTML = `<span style="color:#888">${Math.floor(game.history().length / 2) + 1}.</span> <strong>${sanMove}</strong>`;
                log.appendChild(row);
            } else {
                const row = document.getElementById(`move-row-${Math.floor(game.history().length / 2)}`);
                if (row) row.innerHTML += ` <span style="color:#ffae00;">${sanMove}</span>`;
            }
            log.scrollTop = log.scrollHeight;
        }

        function updateStatus() {
            const header = document.getElementById('boardHeader');
            if (ChessAdapter.isGameOver()) header.textContent = "KẾT THÚC VÁN ĐẤU!";
            else header.textContent = game.turn() === 'w' ? "LƯỢT QUÂN TRẮNG" : "LƯỢT QUÂN ĐEN";
        }

        function bootstrap() {
            if (window.location.protocol === "file:") {
                document.getElementById("fatalScreen").style.display = "flex";
                document.getElementById("fatalMessage").textContent = "LOCAL ENVIRONMENT BLOCKED";
                return;
            }
            document.getElementById('playerColor').onchange = (e) => { humanColor = e.target.value; initGame(); };
            document.getElementById('btnNewGame').onclick = initGame;
            document.getElementById('btnHint').onclick = triggerEngineHint;
            document.getElementById('chessBoard').onclick = (e) => {
                const cell = e.target.closest('.cell');
                if (cell) handleSquareClick(cell.dataset.square);
            };
            game = new Chess();
            initGame();
        }
        window.onload = bootstrap;
    </script>
</body>
</html>
